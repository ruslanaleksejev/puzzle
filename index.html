<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Pixel Puzzle</title>
    <style>
        :root { --accent: #646cff; --bg: #121212; --panel: #1e1e1e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--panel); padding: 15px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .workspace { flex: 1; display: flex; align-items: center; justify-content: center; background: #181818; }
        
        /* Fixed 500x500 container */
        .puzzle-container { 
            width: 500px; height: 500px; 
            border: 2px solid var(--accent); 
            background: #000; 
            display: grid; 
            position: relative;
        }

        .grid-square { 
            border: 0.5px solid rgba(255,255,255,0.1); 
            width: 100%; height: 100%; 
            display: flex; overflow: hidden; 
            aspect-ratio: 1 / 1; 
        }

        /* Anti-stretch image protection */
        .grid-square img, .puzzle-piece img { 
            width: 100% !important; height: 100% !important; 
            object-fit: cover !important; pointer-events: none; 
        }

        .storage-area { height: 130px; background: #1a1a1a; border-top: 2px solid var(--accent); padding: 10px; display: flex; align-items: center; overflow-x: auto; gap: 10px; }
        .puzzle-piece { cursor: grab; flex-shrink: 0; border: 1px solid var(--accent); background: #000; overflow: hidden; aspect-ratio: 1/1; }

        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #333; color: white; transition: 0.2s; }
        .btn-primary { background: var(--accent); }
        .btn-camera { background: #2e7d32; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .diff-btn { background: #2a2a2a; border: 1px solid #444; color: #888; padding: 5px; cursor: pointer; border-radius: 3px; font-size: 0.8em; }
        .diff-btn.active { background: var(--accent); color: white; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        video { width: 80%; max-width: 500px; border: 2px solid var(--accent); border-radius: 10px; background: #000; }
    </style>
</head>
<body>

<header class="header">
    <h3>Pixel Puzzle</h3>
    <div id="timerDisplay" style="font-family: monospace; font-size: 1.5em; color: var(--accent);">00:00</div>
</header>

<div class="main-content">
    <aside class="sidebar">
        <button class="btn btn-primary" onclick="document.getElementById('fIn').click()">📁 Vali foto</button>
        <button class="btn btn-camera" onclick="openCam()">📷 Kaamera</button>
        
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-top:10px">
            <button class="diff-btn" onclick="setD(this, 3)">3x3</button>
            <button class="diff-btn active" onclick="setD(this, 4)">4x4</button>
            <button class="diff-btn" onclick="setD(this, 10)">10x10</button>
        </div>
        <button id="startBtn" class="btn btn-primary" disabled onclick="initGame()" style="margin-top:10px">ALUSTA</button>
        
        <div style="margin-top:auto">
            <button class="btn" onclick="toggleM()">🎵 Muusika</button>
            <audio id="bgM" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        </div>
    </aside>

    <main class="workspace">
        <div id="pGrid" class="puzzle-container"></div>
    </main>
</div>

<div class="storage-area" id="pStorage"></div>

<div id="camModal" class="modal">
    <video id="v" autoplay playsinline></video>
    <div style="margin-top:20px; display:flex; gap:10px">
        <button class="btn btn-primary" style="width:120px" onclick="snap()">📸 PILDISTA</button>
        <button class="btn" style="width:120px" onclick="closeCam()">SULGE</button>
    </div>
</div>

<input type="file" id="fIn" accept="image/*" style="display:none">

<script>
    let rawImg = new Image(), gSize = 4, tInt, timer = 0, stream;
    const grid = document.getElementById('pGrid'), storage = document.getElementById('pStorage');

    async function openCam() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v').srcObject = stream;
            document.getElementById('camModal').style.display = 'flex';
        } catch(e) { alert("Camera error!"); }
    }

    function closeCam() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('camModal').style.display = 'none';
    }

    function snap() {
        const video = document.getElementById('v');
        const canvas = document.createElement('canvas');
        const size = Math.min(video.videoWidth, video.videoHeight);
        canvas.width = 500; canvas.height = 500;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, (video.videoWidth - size)/2, (video.videoHeight - size)/2, size, size, 0, 0, 500, 500);
        rawImg.src = canvas.toDataURL();
        rawImg.onload = () => document.getElementById('startBtn').disabled = false;
        closeCam();
    }

    document.getElementById('fIn').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { 
            rawImg.src = ev.target.result;
            rawImg.onload = () => document.getElementById('startBtn').disabled = false;
        };
        r.readAsDataURL(e.target.files[0]);
    };

    function setD(b, v) {
        document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); gSize = v;
    }

    function initGame() {
        grid.innerHTML = ''; storage.innerHTML = '';
        grid.style.gridTemplateColumns = `repeat(${gSize}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${gSize}, 1fr)`;

        const canvas = document.createElement('canvas');
        canvas.width = 500; canvas.height = 500;
        canvas.getContext('2d').drawImage(rawImg, 0, 0, 500, 500);

        for (let i = 0; i < gSize * gSize; i++) {
            const size = 500 / gSize;
            const x = i % gSize, y = Math.floor(i / gSize);
            const pCanvas = document.createElement('canvas');
            pCanvas.width = size; pCanvas.height = size;
            pCanvas.getContext('2d').drawImage(canvas, x * size, y * size, size, size, 0, 0, size, size);
            
            const url = pCanvas.toDataURL();
            const cell = document.createElement('div');
            cell.className = 'grid-square';
            cell.dataset.correct = i;
            cell.dataset.id = "cell-" + i;
            cell.ondragover = e => e.preventDefault();
            cell.ondrop = handleDrop;
            cell.onclick = () => moveToStorage(cell);
            grid.appendChild(cell);

            addPieceToStorage(i, url);
        }
        
        const pieces = Array.from(storage.children);
        pieces.sort(() => Math.random() - 0.5).forEach(p => storage.appendChild(p));
        startT();
    }

    function addPieceToStorage(idx, url) {
        const div = document.createElement('div');
        div.className = 'puzzle-piece';
        div.style.width = '80px'; div.style.height = '80px';
        div.draggable = true;
        div.innerHTML = `<img src="${url}" data-idx="${idx}">`;
        div.ondragstart = (e) => {
            e.dataTransfer.setData('idx', idx);
            e.dataTransfer.setData('url', url);
            e.dataTransfer.setData('origin', 'storage');
        };
        storage.appendChild(div);
    }

    function handleDrop(e) {
        e.preventDefault();
        const targetCell = e.currentTarget;
        const dragIdx = e.dataTransfer.getData('idx');
        const dragUrl = e.dataTransfer.getData('url');
        const origin = e.dataTransfer.getData('origin');

        const existingImg = targetCell.querySelector('img');

        if (existingImg) {
            const oldIdx = existingImg.dataset.idx;
            const oldUrl = existingImg.src;
            if (origin === 'storage') {
                addPieceToStorage(oldIdx, oldUrl);
            } else {
                const sourceCell = document.querySelector(`[data-id="${origin}"]`);
                sourceCell.innerHTML = `<img src="${oldUrl}" data-idx="${oldIdx}">`;
                setDraggable(sourceCell, oldIdx, oldUrl);
            }
        } else if (origin !== 'storage') {
            const originCell = document.querySelector(`[data-id="${origin}"]`);
            if (originCell) originCell.innerHTML = '';
        }

        targetCell.innerHTML = `<img src="${dragUrl}" data-idx="${dragIdx}">`;
        setDraggable(targetCell, dragIdx, dragUrl);

        if (origin === 'storage') {
            const items = storage.querySelectorAll('.puzzle-piece');
            items.forEach(it => { if(it.querySelector('img').dataset.idx == dragIdx) it.remove(); });
        }
        checkW();
    }

    function setDraggable(cell, idx, url) {
        cell.draggable = true;
        cell.ondragstart = (e) => {
            e.dataTransfer.setData('idx', idx);
            e.dataTransfer.setData('url', url);
            e.dataTransfer.setData('origin', cell.dataset.id);
        };
    }

    function moveToStorage(cell) {
        const img = cell.querySelector('img');
        if (img) {
            addPieceToStorage(img.dataset.idx, img.src);
            cell.innerHTML = ''; cell.draggable = false;
        }
    }

    function startT() {
        if(tInt) clearInterval(tInt); timer = 0;
        tInt = setInterval(() => {
            timer++;
            let m = Math.floor(timer/60).toString().padStart(2,'0'), s = (timer%60).toString().padStart(2,'0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }, 1000);
    }

    function toggleM() {
        const m = document.getElementById('bgM');
        m.paused ? m.play() : m.pause();
    }

    function checkW() {
        const squares = document.querySelectorAll('.grid-square');
        let c = 0;
        squares.forEach(s => {
            const i = s.querySelector('img');
            if(i && i.dataset.idx == s.dataset.correct) c++;
        });
        if(c === gSize * gSize) { clearInterval(tInt); alert("WIN!"); }
    }
</script>
</body>
</html>
